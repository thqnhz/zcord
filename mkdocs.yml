site_name: Zcord

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_signature_annotations: true
            show_root_heading: true
            show_root_toc_entry: false
            docstring_style: google

nav:
  - Home: index.md
  - API: api.md
